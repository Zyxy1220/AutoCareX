<!DOCTYPE html>
<html lang="en">

  <head>

  </head>
  
  <link rel="stylesheet" href="style.css">

  <body>
    <div class="login_container">
      <div class="login_left">
        <img src="image/login_img.png" class="login_img">
      </div>

      <div class="login_right">
        <h2>AutoCareX ID Login</h2>
        <p>Already have an AutoCareX ID? Login <a href="../AutoCareX/signup.html">here</a></p>

        <form action="/login" method="post">
          <label for="acc">ACCOUNT NAME</label><br>
          <input type="text" id="acc" name="acc_name"><br><br>

          <label for="pw">PASSWORD</label><br>
          <input type="password" id="pw" name="password"><br><br>

          <label for="email">EMAIL ADDRESS</label><br>
          <input type="text" id="email" name="email_address"><br><br>

          <button type="submit">GOGOGO</button>
        </form>
      </div>
    </div>
  </body>

</html>
