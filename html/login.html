<!DOCTYPE html>
<html lang="en">

  <head>

  </head>
  
  <link rel="stylesheet" href="login_style.css">

  <body>
    <div class="login_container">
      <div class="login_left">
        <img src="image/login_image.png" class="login_img">
      </div>

      <div class="login_right">
        <div class="profile_content">
          <h1>AutoCareX ID Login</h1>
          <p >Already have an AutoCareX ID? Login <a href="../AutoCareX/signup.html">here.</a></p>

          <form action="/login" method="post">
            <label for="acc">ACCOUNT NAME*</label><br>
            <input type="text" id="acc" name="acc_name" placeholder="Enter your account name"><br>

            <label for="pw">PASSWORD*</label><br>
            <input type="password" id="pw" name="password" placeholder="password"><br>

            <label for="email">EMAIL ADDRESS*</label><br>
            <input type="text" id="email" name="email_address" placeholder="example@email.com"><br>

            <button type="submit">GOGOGO</button>
          </form>
        </div>
      </div>
    </div>
  </body>

</html>
